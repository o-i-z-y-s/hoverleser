# Hoverleser — Dictionary Build Workflow

name: Build Dictionary

"on":
  push:
    branches: [main]
    paths:
      - 'src/scripts/build-dict.js'
      - 'src/background.js'
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  build-dictionary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "require('./src/manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build dictionary (German)
        working-directory: src
        run: |
          mkdir -p dist
          node scripts/build-dict.js \
            --code de \
            --out  dist/de-v${{ steps.version.outputs.VERSION }}.jsonl.gz \
            --compress
          node scripts/build-dict.js \
            --code de \
            --out  dist/de-v${{ steps.version.outputs.VERSION }}.jsonl
          ls -lh dist/de-v*.jsonl dist/de-v*.jsonl.gz

      - name: Upload dictionary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            src/dist/de-v${{ steps.version.outputs.VERSION }}.jsonl.gz
            src/dist/de-v${{ steps.version.outputs.VERSION }}.jsonl
          fail_on_unmatched_files: false
