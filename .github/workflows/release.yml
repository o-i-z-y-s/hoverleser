# Hoverleser — GitHub Actions release workflow
# Triggers on every push to main.
# Produces a signed XPI via AMO (unlisted) and publishes it as a GitHub Release.
#
# Required repository secrets (Settings → Secrets → Actions):
#   AMO_API_KEY     — from addons.mozilla.org/developers → API Keys
#   AMO_API_SECRET  — same page

name: Build & Release

"on":
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./src/manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build unsigned XPI
        working-directory: src
        run: bash package.sh build

      - name: Sign via AMO
        id: sign
        continue-on-error: true
        env:
          AMO_API_KEY:    ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        working-directory: src
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir dist \
            --api-key    "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel    unlisted
          SIGNED=$(ls dist/*.xpi | grep -v unsigned | head -1)
          if [ -n "$SIGNED" ]; then
            cp "$SIGNED" "dist/hoverleser-${{ steps.version.outputs.VERSION }}-signed.xpi"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Hoverleser ${{ steps.version.outputs.TAG }}
          body: |
            ## Hoverleser ${{ steps.version.outputs.TAG }}

            Hover over any German word in Firefox to see its translation, gender, IPA pronunciation and grammatical forms. Fully offline after one-time dictionary import.

            ### Install
            Download the signed `.xpi` and drag it onto any Firefox window.

            ### Dictionary
            Download `de-v*.jsonl.gz`, open the extension in a full tab, drag the file onto the import area and wait for the green dot.
          files: src/dist/hoverleser-*.xpi
          draft: false
          prerelease: false
          make_latest: true
