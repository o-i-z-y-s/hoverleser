# Hoverleser — GitHub Actions release workflow
# Triggers on every push to main.
# Produces a signed XPI via AMO (unlisted) and publishes it as a GitHub Release.
#
# Required repository secrets (Settings → Secrets → Actions):
#   AMO_API_KEY     — from addons.mozilla.org/developers → API Keys
#   AMO_API_SECRET  — same page

name: Build & Release

"on":
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up Node (web-ext requires Node 18+) ───────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install web-ext ───────────────────────────────────────────────
      - name: Install web-ext
        run: npm install -g web-ext

      # ── 4. Read version from manifest ────────────────────────────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 5. Build unsigned XPI (for reference) ────────────────────────────
      - name: Build unsigned XPI
        run: bash package.sh build

      # ── 6. Sign via AMO (unlisted) ───────────────────────────────────────
      #   Produces a signed .xpi that installs on regular Firefox.
      #   If AMO secrets are not yet set, this step fails gracefully and
      #   only the unsigned XPI is uploaded.
      - name: Sign via AMO
        id: sign
        continue-on-error: true
        env:
          AMO_API_KEY:    ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir dist \
            --api-key    "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel    unlisted
          # web-ext names the output differently — normalise it
          SIGNED=$(ls dist/*.xpi | grep -v unsigned | head -1)
          if [ -n "$SIGNED" ]; then
            cp "$SIGNED" "dist/hoverleser-${{ steps.version.outputs.VERSION }}-signed.xpi"
          fi

      # ── 7. Publish GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Hoverleser ${{ steps.version.outputs.TAG }}
          body: |
            ## Hoverleser ${{ steps.version.outputs.TAG }}

            Hover over any German word in Firefox to see its translation, gender, IPA pronunciation and grammatical forms. Fully offline after one-time dictionary import.

            ### Install

            **Regular Firefox** — download the `-signed.xpi` file (if signing succeeded) and drag it onto `about:addons`.

            **Firefox Developer Edition / Nightly** — download the unsigned `.xpi`, go to `about:addons` → gear icon → *Install Add-on From File*, or set `xpinstall.signatures.required = false` in `about:config`.

            ### Dictionary
            Import the German dictionary from the extension popup after installing. The download is ~930 MB from kaikki.org (Wiktionary data, CC BY-SA) and processes entirely in your browser — nothing is sent to any server.

            ### Changelog
            See commit history for changes in this release.
          files: |
            dist/hoverleser-*.xpi
          draft: false
          prerelease: false
          make_latest: true
